<style>
  html, body { background: #F8F5EB; min-height: 100vh; }
  body { font-family: 'IBM Plex Sans', 'IBM Plex Sans Thai', sans-serif; }
  /* subtle paper grain */
  #paperGrain {
    content: ''; position: fixed; inset: 0; pointer-events: none; opacity: 0.05; z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
  }
  #root { position: relative; z-index: 1; }
  a { transition: color 200ms cubic-bezier(0.4,0,0.2,1); }
  a:hover { color: #84B286 !important; }
  button:hover { filter: brightness(0.97); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::selection { background: #B6DDCA; color: #2C2A24; }

  @media (max-width: 880px) {
    nav > div { flex-direction: column; gap: 16px; align-items: flex-start !important; }
  }
</style>
